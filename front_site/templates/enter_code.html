{% extends "base.html" %}

{% block title %}Ввод кода{% endblock %}

{% block content %}
<section class="hero">
    <div class="hero__card">
        <h1 class="hero__title">Проверка кода</h1>
        <p class="page-lead">
            Код отправлен на <strong>{{ email }}</strong>. Введите цифры из письма. Если письма нет, проверьте папку «Спам» и корректность адреса.
        </p>
        <form method="post" action="/enter-code" class="auth-form">
            <label class="auth-form__label">
                <span>Код из письма</span>
                <input
                    class="auth-form__input"
                    type="text"
                    name="code"
                    inputmode="numeric"
                    autocomplete="one-time-code"
                    required
                >
            </label>
            {% if message %}
                <p class="auth-form__message">{{ message }}</p>
            {% endif %}
            <button type="submit" class="auth-form__button">Войти</button>
        </form>
    </div>
</section>
{% endblock %}
