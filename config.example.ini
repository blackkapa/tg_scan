# Пример настроек. Скопируйте в config.ini и заполните.
# config.ini не попадает в git (содержит секреты).

[atracker]
base_url = http://10.115.21.77
username = admin
password = your_password

[telegram]
bot_token = your_telegram_bot_token
admin_ids = 5318971340, 762745786, 331716079, 478895810, 444039860, 879734542, 287069002, 903758046
report_group_id = -1003761721933
; Группа для оповещений по реестру увольнений. Пусто = используется report_group_id
registry_notify_group_id =

[smtp]
host = smtp.yandex.ru
port = 465
use_ssl = true
user = invent_atr@asg.ru
password = your_app_password
from = invent_atr@asg.ru

[paths]
; Файл выгрузки AD (PowerShell) для синхронизации AD → A-Tracker
ad_export = ad_export.json
; Путь к файлу или папке с Excel-реестрами увольнений/перемещений (.xls, .xlsx)
registry_file = data/
; Файл состояния: какие реестры уже обработаны (не удалять)
registry_state = data/registry_processed.json
; Папка, куда перемещать обработанные реестры (пусто = не перемещать)
registry_processed_dir = data/processed

[email]
domain_allowed = asg.ru
