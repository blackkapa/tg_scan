# Пример настроек. Скопируйте в config.ini и заполните.
# config.ini не попадает в git (содержит секреты).

[atracker]
base_url = http://10.115.21.77
username = admin
password = your_password
; Опциональные ID сервисов для потока «Добавить технику» (0 = пока не используется)
; asset_add_request_create_service_id = 0
; asset_add_request_get_service_id = 0
; portfolio_create_service_id = 0
; portfolio_update_service_id = 0
; request_attach_service_id = 0
; asset_find_by_serial_service_id = 0

[telegram]
bot_token = your_telegram_bot_token
admin_ids = 5318971340, 762745786, 331716079, 478895810, 444039860, 879734542, 287069002, 903758046
report_group_id = -1003761721933
; Группа для оповещений по реестру увольнений. Пусто = используется report_group_id
registry_notify_group_id =

[smtp]
host = smtp.yandex.ru
port = 465
use_ssl = true
user = invent_atr@asg.ru
password = your_app_password
from = invent_atr@asg.ru

[paths]
; Файл выгрузки AD (PowerShell) для синхронизации AD → A-Tracker
ad_export = ad_export.json
; Путь к файлу или папке с Excel-реестрами увольнений/перемещений (.xls, .xlsx)
registry_file = data/
; Файл состояния: какие реестры уже обработаны (не удалять)
registry_state = data/registry_processed.json
; Папка, куда перемещать обработанные реестры (пусто = не перемещать)
registry_processed_dir = data/processed

[email]
domain_allowed = asg.ru
; Список почт, которым разрешён админский режим на сайте
; Пример: admin1@asg.ru, admin2@asg.ru
admin_emails =
; Вход без кода из письма (после проверки ФИО/логина в A-Tracker), через запятую
; bypass_code_emails =
; Письмо администратору после загрузки подписанного акта (тема «Подтвердить перемещение №…»)
; transfer_admin_confirm_email = admin@example.com
; Устаревший fallback, если transfer_admin_confirm_email пуст
; transfer_notification_to =

[web]
; Публичный URL для ссылок в письмах (без / в конце)
; public_base_url = https://inventory.example.com
; Блок «Добавить технику»: кнопка, /asset-add/*, список в «Заявки» и «Заявки (админ)» (true/false)
; asset_add_button_enabled = true
; Заявки на перемещение техники (/transfer/start, чекбоксы на «Мои активы», transfer в списках) (true/false)
; transfer_enabled = true
